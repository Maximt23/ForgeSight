# Alembic configuration for CadOwl
# Run migrations with: alembic upgrade head

[alembic]
# Migration script location
script_location = packages/db/migrations

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# Truncate the slug from generated migration file names to this length
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

# Database URL — overridden by env var DATABASE_URL via env.py
sqlalchemy.url = postgresql+asyncpg://cadowl:cadowl@localhost:5432/cadowl


# ─── Logging configuration ─────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S


# ─── Post-write hooks ──────────────────────────────────────────────────
# Optional: format generated migration files with ruff. Enable by installing
# ruff into the active env and uncommenting the block below.
#
# [post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME
