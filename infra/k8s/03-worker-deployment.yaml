apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadowl-worker
  namespace: cadowl
  labels:
    app.kubernetes.io/name: cadowl-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cadowl-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadowl-worker
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: worker
          image: cadowl-api:latest  # same image, different command
          command: ["python", "-m", "apps.worker.main"]
          envFrom:
            - configMapRef:
                name: cadowl-config
            - secretRef:
                name: cadowl-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cadowl-data
