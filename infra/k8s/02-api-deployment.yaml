apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadowl-api
  namespace: cadowl
  labels:
    app.kubernetes.io/name: cadowl-api
    app.kubernetes.io/component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cadowl-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cadowl-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9010"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: cadowl-api:latest  # AI Lab will tag with build SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9010
          envFrom:
            - configMapRef:
                name: cadowl-config
            - secretRef:
                name: cadowl-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cadowl-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cadowl-data
  namespace: cadowl
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cadowl-api
  namespace: cadowl
  labels:
    app.kubernetes.io/name: cadowl-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: cadowl-api
---
# HorizontalPodAutoscaler — scale 3 → 10 based on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cadowl-api
  namespace: cadowl
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cadowl-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# PodDisruptionBudget — keep at least 2 pods up during voluntary disruptions
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cadowl-api
  namespace: cadowl
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cadowl-api
