<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} - {{ brand.app_name }}</title>
  <link rel="icon" type="image/x-icon" href="{{ brand.icon_path }}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-2xl w-full bg-white rounded-2xl shadow p-10 text-center">
    <div class="text-6xl mb-4">{{ emoji }}</div>
    <h1 class="text-3xl font-bold mb-3">{{ title }}</h1>
    <p class="text-gray-600 mb-6">This module is scaffolded and ready for implementation.</p>
    <a href="/dashboard" class="inline-block bg-[#0053e2] text-white px-6 py-3 rounded-lg hover:bg-[#0039a6] transition">
      ← Back to Dashboard
    </a>
  </div>
</body>
</html>
