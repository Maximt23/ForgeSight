name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 14:00 UTC (~9am CST) — catches drift even without commits
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: Reality check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Run audit
        env:
          CADOWL_DEV_MODE: "true"
          PYTHONIOENCODING: utf-8
        run: |
          mkdir -p audit-history
          python -m scripts.audit \
            --html audit-report.html \
            --json audit-report.json \
            --history audit-history

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: |
            audit-report.html
            audit-report.json
          retention-days: 30

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const counts = { critical: 0, error: 0, warning: 0, info: 0 };
            for (const r of report.results) {
              for (const f of r.findings) counts[f.severity]++;
            }
            const status = (counts.critical + counts.error) === 0 ? '✅ PASS' : '❌ FAIL';
            const summary = `## 🐶 Audit: ${status}

| Severity | Count |
|----------|-------|
| 🚨 Critical | ${counts.critical} |
| ❌ Error | ${counts.error} |
| ⚠️ Warning | ${counts.warning} |
| ℹ️ Info | ${counts.info} |

Full HTML report attached to this run as the \`audit-report\` artifact.
`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });
