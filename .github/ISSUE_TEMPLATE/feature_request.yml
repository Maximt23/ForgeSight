name: Feature request
description: Propose a feature aligned to master directive
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: user_story
    attributes:
      label: User story
      description: As a..., I want..., so that...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Explicit pass/fail criteria.
    validations:
      required: true
  - type: textarea
    id: impacts
    attributes:
      label: API/DB/Validation/Audit impacts
      description: Describe all impacts.
