name: Bug report
description: File a bug with reproducible details
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, payloads, and expected behavior.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / evidence
      description: Paste stack traces, API responses, and timestamps.
