# Async test configuration for pytest-asyncio.
# Marks all async tests as "auto" so they run without needing
# explicit @pytest.mark.asyncio on each function.

[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:websockets.*
    ignore::DeprecationWarning:datetime.*
